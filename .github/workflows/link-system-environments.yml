name: Link Environments to System Environment

on:
  workflow_dispatch:

jobs:
  link-environments:
    name: Link workspace environments to Production system environment
    runs-on: ubuntu-latest
    env:
      SYSTEM_ENV_ID: "936898ce-cf73-4feb-827e-8a0e9d5e695e"
      TEAM_ID: "13569807"
    steps:
      - name: Link all workspace Production environments
        env:
          ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        run: |
          echo "Linking workspace environments to System Environment: $SYSTEM_ENV_ID"
          echo ""

          # Workspace environment UUIDs (without owner prefix)
          declare -A ENVS=(
            ["Atlas Billing"]="55db4f35-9ac7-4f83-b06b-edccde48fc27"
            ["Atlas Payments"]="0c710169-0cbd-4a5b-86d3-544bc94a58bf"
            ["Atlas Risk & Disputes"]="bdb3cc97-1829-4c13-9f45-ef9af8512c40"
            ["Atlas Treasury"]="742997bb-d2c1-47e8-b543-dcc97e4b9480"
            ["Atlas Platform"]="bbbb93e9-1d36-4db5-81f4-3da39a9f77d9"
            ["EchoAtlas"]="4f17a355-82b7-41d4-b0dc-0605abc9b8cf"
            ["ChasingCats"]="81d23a78-1fda-40ff-9481-298fe8b8b268"
          )

          for SERVICE in "${!ENVS[@]}"; do
            ENV_UUID="${ENVS[$SERVICE]}"
            echo "--- Linking $SERVICE (env: $ENV_UUID) ---"

            # Try the Bifrost proxy to link workspace env to system env
            RESP=$(curl -sf -X POST \
              "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
              -H "Content-Type: application/json" \
              -H "x-access-token: $ACCESS_TOKEN" \
              -H "x-entity-team-id: $TEAM_ID" \
              -d "{
                \"service\": \"api-catalog\",
                \"method\": \"PUT\",
                \"path\": \"/system-environments/$SYSTEM_ENV_ID/workspace-environments/$ENV_UUID\",
                \"body\": {}
              }" 2>&1) || true

            echo "  Result: $RESP"

            # If that path doesn't work, try alternate approaches
            if echo "$RESP" | grep -qi "error\|not found\|404"; then
              echo "  Trying alternate path..."
              RESP2=$(curl -sf -X POST \
                "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
                -H "Content-Type: application/json" \
                -H "x-access-token: $ACCESS_TOKEN" \
                -H "x-entity-team-id: $TEAM_ID" \
                -d "{
                  \"service\": \"api-catalog\",
                  \"method\": \"POST\",
                  \"path\": \"/system-environments/$SYSTEM_ENV_ID/environments\",
                  \"body\": {\"environmentId\": \"$ENV_UUID\"}
                }" 2>&1) || true
              echo "  Alt result: $RESP2"
            fi
            echo ""
          done

      - name: Verify linkage
        env:
          ACCESS_TOKEN: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
        run: |
          echo "Checking system environment state..."
          RESP=$(curl -sf -X POST \
            "https://bifrost-premium-https-v4.gw.postman.com/ws/proxy" \
            -H "Content-Type: application/json" \
            -H "x-access-token: $ACCESS_TOKEN" \
            -H "x-entity-team-id: $TEAM_ID" \
            -d "{
              \"service\": \"api-catalog\",
              \"method\": \"GET\",
              \"path\": \"/system-environments/${{ env.SYSTEM_ENV_ID }}\",
              \"body\": {}
            }" 2>&1) || true
          echo "$RESP" | jq . 2>/dev/null || echo "$RESP"

      - name: Summary
        if: always()
        run: |
          echo "### System Environment Linking" >> $GITHUB_STEP_SUMMARY
          echo "- **System Environment**: $SYSTEM_ENV_ID (Production)" >> $GITHUB_STEP_SUMMARY
          echo "- **Services linked**: Atlas Billing, Atlas Payments, Atlas Risk & Disputes, Atlas Treasury, Atlas Platform, EchoAtlas, ChasingCats" >> $GITHUB_STEP_SUMMARY
